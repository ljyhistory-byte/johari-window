<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 조하리 창 알아보기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            /* 화면이 작을 때 스크롤이 생기도록 조정 */
            max-height: 90vh;
            overflow-y: auto;
        }
        h2 { color: #333; }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
            line-height: 1.4;
        }
        input[type="text"], input[type="range"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .slider-value {
            text-align: center;
            font-weight: bold;
            color: #007BFF;
            margin-top: 5px;
            display: block;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
        
        /* 결과 화면 스타일 */
        #result-section { display: none; }
        #result-description {
            margin-top: 15px; 
            font-size: 14px; 
            color: #444; 
            background: #f0f4f8; 
            padding: 15px; 
            border-radius: 8px; 
            line-height: 1.5; 
            text-align: left;
        }
        .quadrant-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 5px;
            margin-top: 20px;
        }
        .quadrant {
            padding: 20px 10px;
            border-radius: 5px;
            font-weight: bold;
            color: white;
        }
        .q-open { background-color: #4CAF50; opacity: 0.3; }
        .q-blind { background-color: #FF9800; opacity: 0.3; }
        .q-hidden { background-color: #2196F3; opacity: 0.3; }
        .q-unknown { background-color: #9E9E9E; opacity: 0.3; }
        .active-quadrant { opacity: 1; border: 3px solid #333; }
    </style>
</head>
<body>

<div class="container" id="survey-section">
    <h2>조하리 창 검사</h2>
    <p>나의 의사소통 스타일을 알아봅시다.</p>
    
    <div class="form-group">
        <label for="student-name">이름 (또는 학번)</label>
        <input type="text" id="student-name" placeholder="이름을 입력하세요">
    </div>

    <div class="form-group">
        <label for="disclosure">1. 나는 내 생각과 감정을 다른 사람에게 잘 표현하는 편이다. (자기 공개)</label>
        <input type="range" id="disclosure" min="1" max="10" value="5" oninput="updateValue('disclosure-val', this.value)">
        <span class="slider-value" id="disclosure-val">5점</span>
    </div>

    <div class="form-group">
        <label for="feedback">2. 나는 다른 사람들의 의견이나 지적을 잘 수용하고 묻는 편이다. (피드백 수용)</label>
        <input type="range" id="feedback" min="1" max="10" value="5" oninput="updateValue('feedback-val', this.value)">
        <span class="slider-value" id="feedback-val">5점</span>
    </div>

    <button onclick="calculateResult()">결과 확인하기</button>
</div>

<div class="container" id="result-section">
    <h2>결과 확인</h2>
    <p id="result-text" style="font-size: 16px;"></p>
    
    <div id="result-description"></div>
    
    <div class="quadrant-grid">
        <div class="quadrant q-blind" id="box-blind">보이지 않는 창<br>(신중형)</div>
        <div class="quadrant q-open" id="box-open">열린 창<br>(개방형)</div>
        <div class="quadrant q-unknown" id="box-unknown">미지의 창<br>(고립형)</div>
        <div class="quadrant q-hidden" id="box-hidden">숨겨진 창<br>(주장형)</div>
    </div>
    
    <button style="margin-top: 20px;" onclick="location.reload()">다시 하기</button>
</div>

<script>
    // 슬라이더 값을 실시간으로 보여주는 함수
    function updateValue(id, value) {
        document.getElementById(id).innerText = value + "점";
    }

    // 결과를 계산하고 화면에 보여주며 구글 시트로 전송하는 함수
    function calculateResult() {
        const name = document.getElementById('student-name').value;
        const disclosure = parseInt(document.getElementById('disclosure').value);
        const feedback = parseInt(document.getElementById('feedback').value);

        if(!name) {
            alert("이름을 꼭 입력해주세요!");
            return;
        }

        let resultType = "";
        let activeBoxId = "";
        let description = "";

        // 4분면 로직 및 상세 설명 (1~5점: 낮음, 6~10점: 높음)
        if (disclosure >= 6 && feedback >= 6) {
            resultType = "열린 창 (개방형)";
            activeBoxId = "box-open";
            description = "<strong>[특징]</strong> 자신의 생각과 감정을 솔직하게 표현하고, 친구들의 조언이나 의견도 기꺼이 받아들이는 소통의 달인입니다.<br><br><strong>[조언]</strong> 원만한 교우 관계를 형성하기 가장 좋은 유형입니다. 지금처럼 열린 마음으로 친구들과 소통을 이어나가 보세요!";
            
        } else if (disclosure <= 5 && feedback >= 6) {
            resultType = "보이지 않는 창 (신중형)";
            activeBoxId = "box-blind";
            description = "<strong>[특징]</strong> 친구들의 이야기는 귀 기울여 잘 듣지만, 정작 자신의 진짜 마음이나 생각은 겉으로 잘 표현하지 않는 편입니다.<br><br><strong>[조언]</strong> 남을 배려하는 것도 좋지만, 때로는 자신이 원하는 것과 감정을 조금 더 솔직하게 친구들에게 표현해 보세요!";
            
        } else if (disclosure >= 6 && feedback <= 5) {
            resultType = "숨겨진 창 (주장형)";
            activeBoxId = "box-hidden";
            description = "<strong>[특징]</strong> 자신의 의견이나 감정을 표현하는 데에는 자신감이 넘치지만, 다른 사람의 피드백을 수용하는 데는 다소 방어적일 수 있습니다.<br><br><strong>[조언]</strong> 나의 주장이 강한 만큼, 다른 사람의 관점도 존중하는 태도가 필요합니다. 친구들의 조언에 조금 더 귀를 열어보면 어떨까요?";
            
        } else {
            resultType = "미지의 창 (고립형)";
            activeBoxId = "box-unknown";
            description = "<strong>[특징]</strong> 아직은 자신을 드러내는 것도, 타인의 피드백을 받는 것도 조금 조심스러운 관찰자 유형입니다.<br><br><strong>[조언]</strong> 무리할 필요는 없지만, 편안함을 느끼는 친구에게 아주 작은 내 이야기부터 꺼내보는 연습을 해보는 것을 추천합니다.";
        }

        // 1. 화면에 결과 텍스트 및 설명 업데이트
        document.getElementById('result-text').innerHTML = 
            `<strong>${name}</strong> 학생의 결과는 <strong>[${resultType}]</strong> 입니다.<br>
            <span style="font-size:14px; color:#666;">(자기 공개: ${disclosure}점 / 피드백 수용: ${feedback}점)</span>`;
        document.getElementById('result-description').innerHTML = description;

        // 2. 4분면 하이라이트 처리
        document.querySelectorAll('.quadrant').forEach(el => el.classList.remove('active-quadrant'));
        document.getElementById(activeBoxId).classList.add('active-quadrant');

        // 3. 화면 전환 (설문 숨기고 결과 보여주기)
        document.getElementById('survey-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';

        // 4. 구글 스프레드시트로 데이터 전송하기
        // ★ 중요: 아래 따옴표 안에 선생님의 구글 앱스 스크립트 배포 URL을 넣어주세요!
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz7-fvWWQ_odZKMnNcNvIun2espqrMSlSwTtE4swI1mqWJasptHiWXw2omTKOqzdyq5/exec'; 
        
        // URL을 입력하지 않고 테스트할 때 오류가 나지 않도록 방지
        if (scriptURL === '여기에_복사한_웹앱_URL을_붙여넣으세요') {
            console.log("구글 시트 연동 URL이 입력되지 않아 데이터가 전송되지 않았습니다.");
            return; 
        }

        // 전송할 데이터 묶기
        const formData = new FormData();
        formData.append('name', name);
        formData.append('disclosure', disclosure);
        formData.append('feedback', feedback);
        formData.append('result', resultType);

        // 구글로 전송
        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => console.log('구글 시트로 성공적으로 전송되었습니다.'))
            .catch(error => console.error('에러 발생:', error.message));
    }
</script>

</body>
</html>
